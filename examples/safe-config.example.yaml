profile: default

model:
  provider: <PRIMARY_PROVIDER>
  default: <PRIMARY_MODEL>

paths:
  hermes_home: <YOUR_HERMES_HOME>
  wiki_dir: <YOUR_WIKI_DIR>
  operations_dir: <YOUR_OPERATIONS_DIR>
  secrets_dir: <YOUR_SECRETS_DIR>
  recovery_dir: <YOUR_RECOVERY_DIR>

security:
  redact_secrets: true

privacy:
  redact_pii: true

approvals:
  mode: manual

gateway:
  enabled: <true_or_false>
  platforms:
    - <MESSAGING_PLATFORM>

cron:
  enabled: <true_or_false>
